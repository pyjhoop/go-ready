baseURL = "https://example.com/"
locale = "ko-kr"
title = "Go Ready"
defaultContentLanguage = "ko"

# 이 사이트엔 태그/카테고리가 없다 → 불필요한 페이지 생성 끄기
# (주의: 최상단 키는 반드시 [테이블]보다 위에 와야 한다 — TOML 규칙)
disableKinds = ["taxonomy", "term", "RSS"]

# 레슨 URL: /learn/m3/slices-append/
[permalinks]
  learn = "/learn/:sections[1:]/:slug/"

[markup]
  [markup.goldmark.renderer]
    unsafe = true          # 숏코드가 뿜는 raw HTML 허용
  [markup.highlight]
    noClasses = false      # ← 핵심: 인라인 스타일 대신 CSS 클래스로 출력
    lineNos = false        #    덕분에 우리 팔레트를 그대로 입힐 수 있다
    tabWidth = 4
    guessSyntax = false

[params]
  description = "다른 언어를 이미 아는 개발자를 위한 Go 속성 코스"
  tagline = "You already know how to code — let's make you think in Go."
