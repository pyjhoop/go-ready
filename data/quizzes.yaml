q-m1-basics:
  title: "모듈 1 퀴즈 — Go의 세계관 & 툴링"
  questions:
    - q: "함수나 타입 이름의 첫 글자를 대문자로 쓰면?"
      options:
        - "패키지 외부에 공개(exported)된다"
        - "상수로 취급된다"
        - "컴파일 에러가 난다"
        - "아무 의미 없다 — 스타일일 뿐"
      answer: 0
      explain: "Go에는 public/private 키워드가 없다. 이름의 첫 글자가 대문자면 패키지 밖에서 접근 가능(exported), 소문자면 패키지 내부 전용이다."
    - q: "함수 안에서 선언했지만 한 번도 쓰지 않은 지역 변수가 있으면?"
      options:
        - "무시된다"
        - "실행 시 경고만 뜬다"
        - "컴파일 에러가 난다"
        - "자동으로 zero value가 된다"
      answer: 2
      explain: "사용하지 않는 지역 변수와 import는 경고가 아니라 컴파일 에러다. 컴파일러를 첫 번째 코드 리뷰어로 세워 죽은 코드가 쌓이는 것을 막는다."
    - q: "go run과 go build의 차이는?"
      options:
        - "완전히 같다"
        - "go run은 컴파일 후 바로 실행하고, go build는 실행 파일을 남긴다"
        - "go build는 인터프리터로 실행한다"
        - "go run은 테스트만 돌린다"
      answer: 1
      explain: "go run은 임시로 컴파일해 바로 실행하고 결과물을 남기지 않는다. go build는 배포 가능한 단일 바이너리(실행 파일)를 생성한다."

q-m2:
  title: "모듈 2 퀴즈 — 타입 · 함수 · 제어 흐름"
  questions:
    - q: "짧은 선언 `:=`에 대한 설명으로 옳은 것은?"
      options:
        - "패키지 레벨(함수 바깥)에서도 자유롭게 쓸 수 있다"
        - "함수 안에서만 쓸 수 있고, 좌변에 새 변수가 최소 하나 있어야 한다"
        - "상수를 선언할 때 쓴다"
        - "타입을 항상 명시해야 한다"
      answer: 1
      explain: ":=는 함수 본문에서만 유효하며, 좌변이 전부 기존 변수면 'no new variables' 에러가 난다. 패키지 레벨에서는 var를 써야 한다."
    - q: "`i`가 int, `f`가 float64일 때 `i + f`를 쓰면?"
      options:
        - "자동으로 float64로 변환돼 계산된다"
        - "int로 잘려서 계산된다"
        - "컴파일 에러가 난다"
        - "런타임에 panic이 난다"
      answer: 2
      explain: "Go에는 암묵적 형 변환이 없다. 타입이 다른 변수끼리는 float64(i) + f처럼 명시적으로 변환해야 한다. 조용한 정밀도 손실을 막기 위한 의도적 설계다."
    - q: "Go의 switch에서 각 case가 끝났을 때의 기본 동작은?"
      options:
        - "다음 case로 흘러내린다(fall-through)"
        - "자동으로 break 된다"
        - "무한 반복한다"
        - "default로 점프한다"
      answer: 1
      explain: "Go의 switch는 case를 마치면 자동으로 빠져나온다. C/Java와 달리 break가 필요 없고, 반대로 흘리고 싶을 때만 fallthrough를 명시한다."

q-m3:
  title: "모듈 3 퀴즈 — 슬라이스 · 맵 · 문자열"
  questions:
    - q: "nil map(make 안 한 맵)에 대한 설명으로 옳은 것은?"
      options:
        - "읽기도 쓰기도 모두 panic이다"
        - "읽기는 zero value를 반환하지만, 쓰기는 panic이다"
        - "읽기는 panic이고 쓰기는 자동 초기화된다"
        - "읽기도 쓰기도 모두 정상 동작한다"
      answer: 1
      explain: "nil map은 읽으면 zero value를 돌려주지만, 쓰기(m[k]=v)는 'assignment to entry in nil map' panic이다. 읽기가 되기 때문에 첫 쓰기 전까지 문제가 숨는다."
    - q: "`len(\"한글\")`의 결과는?"
      options:
        - "2 (글자 수)"
        - "6 (바이트 수)"
        - "4 (rune 수 × 2)"
        - "실행 시 에러"
      answer: 1
      explain: "문자열은 UTF-8 바이트열이고 len은 바이트 수를 센다. 한글 한 글자가 3바이트라 6이다. 실제 글자 수는 len([]rune(s))로 2를 얻는다."
    - q: "`sub := s[0:2]`로 만든 sub에 cap 여유가 있을 때 `append(sub, x)`를 하면?"
      options:
        - "항상 새 배열이 만들어져 s는 안전하다"
        - "cap 여유가 있으면 s의 백킹 배열을 덮어써 s가 오염될 수 있다"
        - "컴파일 에러가 난다"
        - "sub의 길이만 늘고 s와는 무관하다"
      answer: 1
      explain: "슬라이싱은 백킹 배열을 공유한다. cap에 여유가 있으면 append는 새 배열을 만들지 않고 공유 배열의 빈 자리(s[2])에 써넣어 원본을 조용히 덮어쓴다. copy나 s[low:high:max]로 방어한다."

q-m4:
  title: "모듈 4 퀴즈 — 구조체 · 메서드 · 인터페이스"
  questions:
    - q: "Go의 임베딩(embedding)이 상속과 다른 결정적 차이는?"
      options:
        - "임베딩은 필드를 복사한다"
        - "가상 디스패치가 없어, 하위에서 같은 메서드를 정의해도 오버라이드가 아니라 가림(shadow)이다"
        - "임베딩은 런타임에만 동작한다"
        - "차이가 없다 — 이름만 다르다"
      answer: 1
      explain: "임베딩은 has-a에 문법 설탕을 얹은 것이다. 가상 디스패치가 없어서, 임베딩된 타입의 메서드 내부 호출은 여전히 그 타입의 메서드를 부른다. super도 오버라이드도 없다."
    - q: "값 리시버 메서드 `func (c Counter) Inc() { c.n++ }`를 호출하면?"
      options:
        - "원본의 n이 1 증가한다"
        - "복사본의 n만 증가하고 원본은 그대로다"
        - "컴파일 에러가 난다"
        - "panic이 난다"
      answer: 1
      explain: "값 리시버는 원본의 복사본을 받는다. 복사본의 n을 올려도 메서드가 끝나면 버려지고 원본은 안 바뀐다. 상태를 변경하려면 포인터 리시버(*Counter)를 써야 한다."
    - q: "Go에서 타입이 인터페이스를 만족하는 방법은?"
      options:
        - "implements 키워드로 명시 선언한다"
        - "인터페이스를 import하고 등록한다"
        - "인터페이스가 요구하는 메서드를 모두 가지면 자동으로(암묵적으로) 만족한다"
        - "런타임에 인터페이스를 상속한다"
      answer: 2
      explain: "Go는 암묵적 만족(구조적 타이핑)이다. 필요한 메서드를 다 갖추면 implements 선언 없이, 인터페이스를 import하지 않아도 자동으로 만족한다."
    - q: "`*MyError` 타입의 nil 포인터를 error로 반환하면 호출부에서 `err != nil`은?"
      options:
        - "false — nil이니까"
        - "true — 인터페이스에 타입 칸이 채워지기 때문"
        - "컴파일 에러"
        - "매번 다르다"
      answer: 1
      explain: "인터페이스는 (타입, 값) 쌍이다. nil 포인터라도 타입 칸(*MyError)이 채워지면 인터페이스 자체는 nil이 아니라서 err != nil이 참이 된다. 에러가 없으면 그냥 nil을 반환해야 한다."
