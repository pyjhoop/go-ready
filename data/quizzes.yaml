q-m3:
  title: "모듈 3 퀴즈 — 슬라이스 · 맵 · 문자열"
  questions:
    - q: "nil map(var m map[string]int)에 값을 쓰면?"
      options:
        - "자동으로 초기화된다"
        - "무시된다"
        - "panic이 발생한다"
        - "0을 반환한다"
      answer: 2
      explain: "nil map은 읽기는 되지만 쓰기는 panic이다. 쓰기 전에 make(map[...]...)로 초기화해야 한다."
    - q: 'len("한글")의 결과는?'
      options:
        - "2"
        - "6"
        - "4"
        - "언어 설정에 따라 다름"
      answer: 1
      explain: "len은 문자 수가 아니라 바이트 수를 센다. UTF-8에서 한글 한 글자는 3바이트라 6이다. 문자 수는 len([]rune(s))."
    - q: "두 슬라이스가 같은 백킹 배열을 공유할 때, 한쪽 원소를 수정하면?"
      options:
        - "다른 쪽에도 반영될 수 있다"
        - "절대 영향 없다"
        - "즉시 복사가 일어난다"
        - "컴파일 에러"
      answer: 0
      explain: "슬라이스는 배열의 뷰다. 백킹을 공유하면 한쪽 수정이 다른 쪽에 보인다. 독립이 필요하면 copy()를 쓴다."
