<nav class="sidebar" id="sidebar" aria-label="모듈 네비게이션">

    <span class="brand-gopher">Go</span>
    <span>Go <span class="go">Ready</span></span>
  </a>
  <a class="nav-dash{{ if .IsHome }} active{{ end }}" href="{{ site.Home.Permalink }}">📋 대시보드</a>
  <div class="nav-label">모듈</div>
  {{ range where site.Sections "Section" "learn" }}

      <span class="nav-title">{{ .Title }}</span>
      <span class="nav-check" data-module-check="{{ .Params.module }}">✓</span>

    {{ end }}
