<svg viewBox="0 0 640 320" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, monospace" role="img" aria-label="값 리시버는 복사본을 수정해 원본이 안 바뀌고, 포인터 리시버는 원본을 직접 수정하는 차이를 나타낸 도식">
  <!-- value receiver row -->
  <text x="30" y="40" font-size="13" font-weight="700" fill="var(--text)">값 리시버  func (c Counter) IncValue()</text>

  <rect x="30" y="54" width="130" height="60" rx="8" fill="var(--card)" stroke="var(--border)" stroke-width="1.5"/>
  <text x="95" y="78" text-anchor="middle" font-size="11" fill="var(--text-muted)">원본 c</text>
  <text x="95" y="100" text-anchor="middle" font-size="15" fill="var(--text)">n = 0</text>

  <path d="M 168 84 L 232 84" fill="none" stroke="var(--text-muted)" stroke-width="1.6" marker-end="url(#ar)"/>
  <text x="200" y="76" text-anchor="middle" font-size="10" fill="var(--text-muted)">복사</text>

  <rect x="240" y="54" width="130" height="60" rx="8" fill="#f1f5f9" stroke="var(--border)" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="305" y="78" text-anchor="middle" font-size="11" fill="var(--text-muted)">복사본 (메서드 안)</text>
  <text x="305" y="100" text-anchor="middle" font-size="15" fill="var(--text)">n = 0 → 1</text>

  <text x="400" y="90" font-size="12.5" fill="#92400e">복사본만 1이 됨 →</text>
  <text x="400" y="108" font-size="12.5" font-weight="700" fill="#92400e">원본은 그대로 0</text>

  <!-- divider -->
  <line x1="30" y1="150" x2="610" y2="150" stroke="var(--border)" stroke-width="1"/>

  <!-- pointer receiver row -->
  <text x="30" y="190" font-size="13" font-weight="700" fill="var(--brand-dark)">포인터 리시버  func (c *Counter) IncPtr()</text>

  <rect x="30" y="204" width="130" height="60" rx="8" fill="var(--brand-soft)" stroke="var(--brand)" stroke-width="1.6"/>
  <text x="95" y="228" text-anchor="middle" font-size="11" fill="var(--brand-dark)">원본 c</text>
  <text x="95" y="250" text-anchor="middle" font-size="15" fill="var(--text)">n = 0 → 1</text>

  <path d="M 168 234 L 232 234" fill="none" stroke="var(--go-blue)" stroke-width="1.8" marker-end="url(#ab)"/>
  <text x="200" y="226" text-anchor="middle" font-size="10" fill="var(--go-blue)">주소 &c</text>

  <rect x="240" y="204" width="150" height="60" rx="8" fill="var(--card)" stroke="var(--go-blue)" stroke-width="1.5"/>
  <text x="315" y="228" text-anchor="middle" font-size="11" fill="var(--text-muted)">메서드 안 *c</text>
  <text x="315" y="250" text-anchor="middle" font-size="13" fill="var(--text)">같은 원본을 가리킴</text>

  <text x="420" y="240" font-size="12.5" font-weight="700" fill="var(--brand-dark)">원본이 1로 바뀐다</text>

  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="var(--text-muted)"/>
    </marker>
    <marker id="ab" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="var(--go-blue)"/>
    </marker>
  </defs>
</svg>
