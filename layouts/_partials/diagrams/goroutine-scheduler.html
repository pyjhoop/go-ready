<svg viewBox="0 0 640 320" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, monospace" role="img" aria-label="Go 런타임의 G-M-P 스케줄러 모델: 많은 goroutine이 소수의 OS 스레드 위에 다중화되는 구조도">
  <text x="320" y="26" text-anchor="middle" font-size="13" font-weight="700" fill="var(--text)">G-M-P: 수천 개의 G가 소수의 M 위에서 돈다</text>

  <!-- G pool -->
  <text x="30" y="58" font-size="11" fill="var(--text-muted)">G — goroutine (경량, 수천 개)</text>
  <g>
    <circle cx="52" cy="86" r="15" fill="var(--brand-soft)" stroke="var(--brand)" stroke-width="1.5"/>
    <circle cx="90" cy="86" r="15" fill="var(--brand-soft)" stroke="var(--brand)" stroke-width="1.5"/>
    <circle cx="128" cy="86" r="15" fill="var(--brand-soft)" stroke="var(--brand)" stroke-width="1.5"/>
    <circle cx="166" cy="86" r="15" fill="var(--brand-soft)" stroke="var(--brand)" stroke-width="1.5"/>
    <circle cx="204" cy="86" r="15" fill="var(--brand-soft)" stroke="var(--brand)" stroke-width="1.5"/>
    <text x="52" y="90" text-anchor="middle" font-size="11" fill="var(--brand-dark)">G</text>
    <text x="90" y="90" text-anchor="middle" font-size="11" fill="var(--brand-dark)">G</text>
    <text x="128" y="90" text-anchor="middle" font-size="11" fill="var(--brand-dark)">G</text>
    <text x="166" y="90" text-anchor="middle" font-size="11" fill="var(--brand-dark)">G</text>
    <text x="204" y="90" text-anchor="middle" font-size="11" fill="var(--brand-dark)">G</text>
    <text x="240" y="90" font-size="13" fill="var(--text-muted)">…</text>
  </g>

  <!-- P (logical processors, run queues) -->
  <text x="30" y="150" font-size="11" fill="var(--text-muted)">P — 논리 프로세서 (실행 큐, 보통 GOMAXPROCS개)</text>
  <rect x="40" y="162" width="150" height="44" rx="8" fill="var(--card)" stroke="var(--go-blue)" stroke-width="1.6"/>
  <text x="115" y="189" text-anchor="middle" font-size="12" fill="var(--text)">P (run queue)</text>
  <rect x="240" y="162" width="150" height="44" rx="8" fill="var(--card)" stroke="var(--go-blue)" stroke-width="1.6"/>
  <text x="315" y="189" text-anchor="middle" font-size="12" fill="var(--text)">P (run queue)</text>

  <!-- M (OS threads) -->
  <text x="30" y="248" font-size="11" fill="var(--text-muted)">M — OS 스레드 (진짜 커널 스레드, 소수)</text>
  <rect x="40" y="260" width="150" height="44" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1.4"/>
  <text x="115" y="287" text-anchor="middle" font-size="12" fill="#e2e8f0">M (OS thread)</text>
  <rect x="240" y="260" width="150" height="44" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1.4"/>
  <text x="315" y="287" text-anchor="middle" font-size="12" fill="#e2e8f0">M (OS thread)</text>

  <!-- connectors -->
  <path d="M 115 108 L 115 160" fill="none" stroke="var(--text-muted)" stroke-width="1.3" marker-end="url(#gs)"/>
  <path d="M 190 108 L 300 160" fill="none" stroke="var(--text-muted)" stroke-width="1.3" marker-end="url(#gs)"/>
  <path d="M 115 208 L 115 258" fill="none" stroke="var(--go-blue)" stroke-width="1.6" marker-end="url(#gsb)"/>
  <path d="M 315 208 L 315 258" fill="none" stroke="var(--go-blue)" stroke-width="1.6" marker-end="url(#gsb)"/>

  <!-- note -->
  <rect x="420" y="150" width="196" height="154" rx="10" fill="#fffbeb" stroke="#fcd97a" stroke-width="1.5"/>
  <text x="438" y="178" font-size="11.5" font-weight="700" fill="#92400e">런타임이 M:N 다중화</text>
  <text x="438" y="200" font-size="11" fill="#92400e">· G는 수 KB 스택으로 시작</text>
  <text x="438" y="220" font-size="11" fill="#92400e">· 블로킹되면 런타임이 다른</text>
  <text x="438" y="236" font-size="11" fill="#92400e">  G로 M을 갈아끼운다</text>
  <text x="438" y="258" font-size="11" fill="#92400e">· 커널 스레드 전환보다 훨씬</text>
  <text x="438" y="274" font-size="11" fill="#92400e">  싸다 → 수만 개도 가능</text>
  <text x="438" y="296" font-size="11" font-weight="700" fill="#92400e">go f() 한 줄의 비용</text>

  <defs>
    <marker id="gs" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="var(--text-muted)"/>
    </marker>
    <marker id="gsb" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="var(--go-blue)"/>
    </marker>
  </defs>
</svg>
